<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Personal Finance Tracker</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body>
    <div id="login-screen" class="login-screen">
      <div class="login-card">
        <h1>Secure Login</h1>
        <p>Enter your 4-digit PIN to access your finance tracker.</p>
        <form id="login-form">
          <label for="pin">PIN</label>
          <input type="password" id="pin" name="pin" maxlength="4" inputmode="numeric" pattern="\d{4}" placeholder="1234" required />
          <p id="login-error" class="error-message"></p>
          <button type="submit" class="primary-btn">Unlock</button>
        </form>
      </div>
    </div>

    <main class="container hidden">
      <header class="hero">
        <h1>Personal Finance Tracker</h1>
        <p>Track your income, expenses, balance and spending distribution.</p>
      </header>

      <section class="tracker-grid">
        <div class="tracker-card">
          <h2>Add Transaction</h2>
          <form id="transaction-form">
            <label for="description">Description</label>
            <input type="text" id="description" name="description" placeholder="e.g. Grocery shopping" required />

            <label for="amount">Amount</label>
            <input type="number" id="amount" name="amount" step="0.01" placeholder="e.g. 100.00" required />

            <label for="type">Type</label>
            <select id="type" name="type" required>
              <option value="income">Income</option>
              <option value="expense">Expense</option>
              <option value="savings">Savings</option>
              <option value="others">Others</option>
            </select>

            <button type="submit" class="primary-btn">Add Transaction</button>
          </form>
        </div>
        <div class="tracker-card summary-card">
          <h2>Balance Summary</h2>
          <div class="summary-item">
            <span>Total Income</span>
            <strong id="total-income">₦0.00</strong>
          </div>
          <div class="summary-item">
            <span>Total Expenses</span>
            <strong id="total-expenses">₦0.00</strong>
          </div>
          <div class="summary-item balance">
            <span>Current Balance</span>
            <strong id="current-balance">₦0.00</strong>
          </div>
        </div>
      </section>

      <section class="chart-card tracker-card">
        <h2>Transaction Pie Chart Visual</h2>
        <div class="chart-wrapper">
          <canvas id="finance-chart" aria-label="Transaction pie chart visual" role="img"></canvas>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
